<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة حاسبات التفاعلية</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; margin: 10px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        input { padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 5px; width: 80%; }
        #status { font-weight: bold; color: #d9534f; margin-top: 20px; font-size: 20px; }
        .admin-panel { border-top: 2px solid #eee; margin-top: 20px; padding-top: 10px; background: #fffde7; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🏆 مسابقة أونلاين</h1>
        
        <div id="setup-area">
            <input type="text" id="username" placeholder="أدخل اسمك"><br>
            <button onclick="createRoom()">إنشاء مجموعة جديدة</button>
            <hr>
            <input type="text" id="roomInput" placeholder="أدخل كود المجموعة">
            <button onclick="joinRoom()">انضمام للمجموعة</button>
        </div>

        <div id="room-area" style="display:none;">
            <h2 id="displayCode"></h2>
            <p id="displayName"></p>
            
            <button id="buzzBtn" onclick="pressBuzzer()" style="width:200px; height:200px; border-radius:50%; background:#28a745; font-size:24px;">اضغط للإجابة!</button>
            
            <div id="status">الزرار متاح.. أسرع!</div>

            <div id="admin-panel" class="admin-panel" style="display:none;">
                <h3>لوحة تحكم الأدمن</h3>
                <button onclick="resetBuzzer()" style="background:#dc3545;">إعادة تفعيل الزرار للكل</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // ******************************************
        // 1. ضع الـ Config الخاص بك هنا بالكامل
        const firebaseConfig = {
    apiKey: "AIzaSyC7ovcq2UUgk9iY5r_kOdN1k38sIwmLJz4",
    authDomain: "competitionapp-14dd2.firebaseapp.com",
databaseURL: "https://competitionapp-14dd2-default-rtdb.firebaseio.com/",
    projectId: "competitionapp-14dd2",
    storageBucket: "competitionapp-14dd2.firebasestorage.app",
    messagingSenderId: "111940102162",
    appId: "1:111940102162:web:a74ee801c6fa371b0c10cb"
  };
        // ******************************************

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myName = "";
        let currentRoom = "";
        let isOwner = false;

        // وظيفة إنشاء الغرفة
        window.createRoom = function() {
            myName = document.getElementById('username').value;
            if(!myName) return alert("اكتب اسمك الأول");
            
            currentRoom = Math.random().toString(36).substring(2, 7).toUpperCase();
            isOwner = true;
            
            // تهيئة الغرفة في الداتابيز
            set(ref(db, 'rooms/' + currentRoom), {
                owner: myName,
                buzzerLocked: false,
                pressedBy: ""
            });

            showRoom();
        };

        // وظيفة الانضمام
        window.joinRoom = function() {
            myName = document.getElementById('username').value;
            currentRoom = document.getElementById('roomInput').value.toUpperCase();
            if(!myName || !currentRoom) return alert("أدخل اسمك وكود الغرفة");
            
            showRoom();
        };

        function showRoom() {
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('room-area').style.display = 'block';
            document.getElementById('displayCode').innerText = "كود الغرفة: " + currentRoom;
            document.getElementById('displayName').innerText = "أهلاً يا " + myName;
            
            if(isOwner) document.getElementById('admin-panel').style.display = 'block';

            // الاستماع لتغييرات الغرفة لحظياً
            const roomRef = ref(db, 'rooms/' + currentRoom);
            onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    const btn = document.getElementById('buzzBtn');
                    const status = document.getElementById('status');
                    
                    if(data.buzzerLocked) {
                        btn.disabled = true;
                        status.innerText = "🚨 ضغط عليها: " + data.pressedBy;
                    } else {
                        btn.disabled = false;
                        status.innerText = "الزرار متاح.. أسرع!";
                    }
                }
            });
        }

        // وظيفة الضغط على الزرار
        window.pressBuzzer = function() {
            const roomRef = ref(db, 'rooms/' + currentRoom);
            // تحديث الداتابيز: قفل الزرار وكتابة اسمك
            update(roomRef, {
                buzzerLocked: true,
                pressedBy: myName
            });
        };

        // وظيفة إعادة التفعيل (للأدمن فقط)
        window.resetBuzzer = function() {
            const roomRef = ref(db, 'rooms/' + currentRoom);
            update(roomRef, {
                buzzerLocked: false,
                pressedBy: ""
            });
        };
    </script>
</body>
</html>
